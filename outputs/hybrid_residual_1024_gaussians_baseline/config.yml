dataset:
  image_list:
  - 15
  image_size:
  - 256
  - 256
  path: ./kodak
  random_count: 5
  selection_mode: full
device: cpu
em:
  covariance_type: full
  enabled: true
  max_iter: 500
  minibatch:
    min_samples: 5000
    subsample_ratio: 0.15
  n_components: 2500
experiment:
  diagnostic_n_std: 2.0
  output_dir: ./outputs
  plot_interval: 50
  run_diagnostics: true
  save_plots: true
  save_raw_data: false
  save_renders: true
gaussian_splatting:
  backup_samples: 0
  densification: true
  densification_interval: 10
  enabled: false
  gaussian_threshold: 1.2
  gradient_threshold: 0.01
  kernel_size: 33
  lambda_dssim: 0.2
  learning_rate: 0.01
  num_epochs: 200
  primary_samples: 2500
  pruning: true
hybrid_residual:
  compare_pure_em: false
  em_variant: standard
  enabled: true
  max_iter: 14
  n_init: 128
  n_per_iter: 64
  n_total: 1024
  residual_threshold: 0.0001
  step_size: 1.0
  use_minibatch: false
  visualize:
    enabled: false
    fps: 2
    make_gif: false
    make_mp4: false
    n_std_ellipse: 2.0
metrics:
  compute_lpips: true
