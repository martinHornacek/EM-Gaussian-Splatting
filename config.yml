# Configuration for EM-GS vs 2D-GS Comparison
# ================================================

# Dataset Configuration
dataset:
  path: "./kodak"                    # Path to Kodak dataset
  image_size: [256, 256]             # Resize images to this size
  
  # Image selection mode: "full", "random", or "list"
  # - "full": Process all images in the dataset
  # - "random": Randomly select N images (specify in random_count)
  # - "list": Process specific images (specify in image_list)
  selection_mode: "list"
  
  # For random mode: number of images to randomly select
  random_count: 5
  
  # For list mode: specific kodak images to process (e.g., [1, 3, 5, 10, 24])
  # Image numbers correspond to kodim01.png, kodim03.png, etc.
  image_list: [15]
  
# Experiment Settings
experiment:
  output_dir: ./outputs
  save_plots: true
  save_renders: true
  save_raw_data: true
  plot_interval: 50        # Save intermediate plot every N epochs (2D-GS)
  run_diagnostics: true
  diagnostic_n_std: 2.0    # Number of standard deviations for diagnostic ellipses

em:
  enabled: true
  n_components: 256                # Number of Gaussian components
  covariance_type: full            # 'full', 'diag', 'spherical', 'tied'
  max_iter: 500                    # Maximum EM iterations
  
  # Mini-batch EM settings
  minibatch:
    subsample_ratio: 0.15          # Fraction of pixels to subsample (0.0–1.0)
    min_samples: 5000              # Minimum number of pixels to use

# 2D Gaussian Splatting Settings
gaussian_splatting:
  enabled: true                      # Run 2D Gaussian Splatting
  primary_samples: 5000             # Number of Gaussians
  backup_samples: 0                  # Backup Gaussians for densification
  num_epochs: 200                    # Training epochs
  learning_rate: 0.01                # Learning rate
  kernel_size: 33                    # Gaussian kernel size
  
  # Loss function
  lambda_dssim: 0.2                  # Weight for dSSIM loss (1-lambda)*L1 + lambda*dSSIM
  
  # Densification & Pruning
  densification: true               # Enable densification
  densification_interval: 10         # Densify every N epochs
  gradient_threshold: 0.01           # Gradient threshold for densification
  gaussian_threshold: 1.2            # Size threshold for splitting
  pruning: true                      # Enable pruning (alpha < 0.01)

# Hybrid Residual Refinement Settings
# ======================================
# Iterative residual correction on top of an initial EM approximation.
# Positive and negative residuals are fitted separately so the correction
# can both add and subtract intensity.
hybrid_residual:
  enabled: true

  # Gaussian budget
  n_total: 1024         # Total Gaussians across all stages (initial + residual)
  n_init: 128           # Gaussians used in the initial EM approximation (n_init < n_total)
  n_per_iter: 64        # Gaussians added per refinement iteration

  # Stopping criteria
  max_iter: 14          # Maximum refinement iterations  (1024-128)/64 = 14 fills budget exactly
  residual_threshold: 0.0001  # Stop early when mean |residual| falls below this

  # oracle_clamp: DEPRECATED — set to true to restore old behaviour.
  # When true, corrections are bounded by the exact residual at each pixel,
  # which introduces data leakage (oracle feedback) and inflates PSNR/SSIM.
  # Default is false for honest evaluation.
  oracle_clamp: false

  # Correction damping: scale applied to (I_pos_corr - I_neg_corr) each step.
  # With render_gaussians_signed the correction at a pixel is the Gaussian's
  # learned mean colour (not the actual residual), which can overshoot pixels
  # at cluster edges where the true residual is smaller than the mean colour.
  # Keep step_size <= 0.5 to limit overshoot; any residual over-correction
  # flips sign and is absorbed in the next iteration.
  # With oracle_clamp: true (deprecated), keep step_size <= 0.5.
  step_size: 0.5

  # EM variant for the INITIAL fit ('standard' = full dataset, 'minibatch' = subsampled)
  em_variant: "minibatch"

  # When true (default), each residual EM fit is capped at max(n_comp*20, 20 000) samples.
  # Set to false for full-dataset fitting (more accurate, slower).
  use_minibatch: true

  # Run pure EM with n_total Gaussians as a quality baseline for comparison
  compare_pure_em: true

  # Visualization — per-iteration frames and animated videos
  visualize:
    enabled: true

    # Playback speed for GIF / MP4 output
    fps: 2

    # MP4 video (requires:  pip install imageio imageio-ffmpeg)
    make_mp4: true

    # Animated GIF (Pillow — always available, lower quality than MP4)
    make_gif: false

    # Sigma level used when drawing Gaussian ellipse contours on residuals
    n_std_ellipse: 2.0

# Metrics to Track
metrics:
  compute_lpips: true                # Compute LPIPS (requires lpips library)
  # Always computed: Loss, MSE, RMSE, PSNR, dSSIM, compression metrics
  
# Device
device: "cpu"                       # "cuda" or "cpu" (auto-detects if cuda available)