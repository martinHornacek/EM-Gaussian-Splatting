# Configuration for EM-GS vs 2D-GS Comparison
# ================================================

# Dataset Configuration
dataset:
  path: "./kodak"                    # Path to Kodak dataset
  image_size: [256, 256]             # Resize images to this size
  
  # Image selection mode: "full", "random", or "list"
  # - "full": Process all images in the dataset
  # - "random": Randomly select N images (specify in random_count)
  # - "list": Process specific images (specify in image_list)
  selection_mode: "list"
  
  # For random mode: number of images to randomly select
  random_count: 5
  
  # For list mode: specific kodak images to process (e.g., [1, 3, 5, 10, 24])
  # Image numbers correspond to kodim01.png, kodim03.png, etc.
  image_list: [15]
  
# Experiment Settings
experiment:
  output_dir: ./outputs
  save_plots: true
  save_renders: true
  save_raw_data: true
  plot_interval: 50        # Save intermediate plot every N epochs (2D-GS)
  run_diagnostics: true
  diagnostic_n_std: 2.0    # Number of standard deviations for diagnostic ellipses

em:
  enabled: true
  n_components: 256                # Number of Gaussian components
  covariance_type: full            # 'full', 'diag', 'spherical', 'tied'
  max_iter: 500                    # Maximum EM iterations
  
  # Mini-batch EM settings
  minibatch:
    subsample_ratio: 0.15          # Fraction of pixels to subsample (0.0–1.0)
    min_samples: 5000              # Minimum number of pixels to use

# 2D Gaussian Splatting Settings
gaussian_splatting:
  enabled: true                      # Run 2D Gaussian Splatting
  primary_samples: 5000             # Number of Gaussians
  backup_samples: 0                  # Backup Gaussians for densification
  num_epochs: 200                    # Training epochs
  learning_rate: 0.01                # Learning rate
  kernel_size: 33                    # Gaussian kernel size
  
  # Loss function
  lambda_dssim: 0.2                  # Weight for dSSIM loss (1-lambda)*L1 + lambda*dSSIM
  
  # Densification & Pruning
  densification: true               # Enable densification
  densification_interval: 10         # Densify every N epochs
  gradient_threshold: 0.01           # Gradient threshold for densification
  gaussian_threshold: 1.2            # Size threshold for splitting
  pruning: true                      # Enable pruning (alpha < 0.01)

# Metrics to Track
metrics:
  compute_lpips: true                # Compute LPIPS (requires lpips library)
  # Always computed: Loss, MSE, RMSE, PSNR, dSSIM, compression metrics
  
# Device
device: "cpu"                       # "cuda" or "cpu" (auto-detects if cuda available)