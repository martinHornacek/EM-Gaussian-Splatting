# config_kodak_native_fullbatch.yml
# Hybrid residual refinement — FULL-BATCH variant — native Kodak resolution.
#
# Kodak images are 768×512 (landscape, 18 images) and 512×768 (portrait, 6 images).
# Setting image_size to null disables downsampling so images are processed at
# their original resolution.
#
# bpp at native resolution (768×512 = 393,216 pixels):
#   K=2048 → 2048 × 9 × 32 / 393,216 = 1.50 bpp
#
# ⚠ Runtime warning: full-batch uses ALL 393,216 pixels (vs. 65,536 at 256×256)
#   for each residual GMM fit. With 14 iterations × 2 fits per iter × 24 images =
#   672 fits, expect ~45–90 min per image → ~18–36 hours total on CPU.
#   Run overnight or on a machine with many cores.
#
# Run:
#   python run_hybrid_residual.py --config config_kodak_native_fullbatch.yml
#
# Results land in:  outputs/hybrid_residual_<timestamp>/
# ============================================================

dataset:
  path: "./kodak"
  image_size: null              # null = no resize; use native Kodak resolution
  selection_mode: "full"        # all 24 Kodak images
  random_count: 5
  image_list: [15]              # ignored when selection_mode = full

experiment:
  output_dir: ./outputs
  save_plots: true
  save_renders: true
  save_raw_data: false
  plot_interval: 50
  run_diagnostics: true
  diagnostic_n_std: 2.0

em:
  enabled: true
  n_components: 2500
  covariance_type: full
  max_iter: 500
  minibatch:
    subsample_ratio: 0.15
    min_samples: 5000

gaussian_splatting:
  enabled: false
  primary_samples: 2500
  backup_samples: 0
  num_epochs: 200
  learning_rate: 0.01
  kernel_size: 33
  lambda_dssim: 0.2
  densification: true
  densification_interval: 10
  gradient_threshold: 0.01
  gaussian_threshold: 1.2
  pruning: true

hybrid_residual:
  enabled: true

  # Gaussian budget
  # bpp = K × 9 × 32 / (768 × 512) = K × 288 / 393,216
  # K=2048 → 1.50 bpp
  n_total: 2048
  n_init: 256              # n_total / 8
  n_per_iter: 128          # (2048 - 256) / 14 = 128
  max_iter: 14

  residual_threshold: 0.0001
  step_size: 1.0

  # --- VARIANT: FULL-BATCH ---
  # Initial EM fit uses full pixel array; residual GMMs also use all 393,216 px.
  # More accurate per-fit but significantly slower than minibatch.
  em_variant: "standard"
  use_minibatch: false

  compare_pure_em: false

  visualize:
    enabled: false
    fps: 2
    make_mp4: false
    make_gif: false
    n_std_ellipse: 2.0

metrics:
  compute_lpips: true

device: "cpu"
